<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Démo — Les données</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .code-block {
      background: #1e2130;
      border: 1px solid #2a2f45;
      border-radius: 10px;
      padding: 2rem 2.5rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 15px;
      line-height: 2.1;
      width: 100%;
      max-width: 680px;
    }
    .kw  { color: #1D9E75; }
    .fn  { color: #60a5fa; }
    .str { color: #f97316; }
    .num { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="code-block">
    <span class="kw">const</span> <span class="fn">donnees</span> = [<br>
    &nbsp;&nbsp;{ region: <span class="str">"Nord"</span>,  ventes: <span class="num">12400</span>, crois: <span class="str">"+8%"</span>  },<br>
    &nbsp;&nbsp;{ region: <span class="str">"Sud"</span>,   ventes: <span class="num">9800</span>,  crois: <span class="str">"+3%"</span>  },<br>
    &nbsp;&nbsp;{ region: <span class="str">"Est"</span>,   ventes: <span class="num">15200</span>, crois: <span class="str">"+12%"</span> },<br>
    &nbsp;&nbsp;{ region: <span class="str">"Ouest"</span>, ventes: <span class="num">11000</span>, crois: <span class="str">"+5%"</span>  },<br>
    ]
  </div>
</body>
</html>
