<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Démo — Dashboard interactif</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      /* background: #0f1117; */
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .dashboard {
      background: #1e2130;
      border: 1px solid #2a2f45;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 800px;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f1117;
      border: 1px solid #2a2f45;
      border-radius: 8px;
      padding: 0 14px;
      margin-bottom: 1.2rem;
      transition: border-color .2s;
    }
    .search-wrap:focus-within { border-color: #1D9E75; }
    .search-wrap svg { width: 18px; height: 18px; flex-shrink: 0; color: #64748b; }
    .search-wrap input {
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 0;
      font-size: 16px;
      color: #e2e8f0;
      width: 100%;
    }
    .search-wrap input::placeholder { color: #475569; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
    }
    .metric {
      background: #0f1117;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }
    .metric-label { font-size: 13px; color: #64748b; margin-bottom: 4px; }
    .metric-value { font-size: 28px; font-weight: 500; }
    table { width: 100%; border-collapse: collapse; font-size: 16px; }
    thead tr { border-bottom: 1px solid #2a2f45; }
    th {
      padding: 12px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    th:not(:first-child) { text-align: right; }
    td { padding: 14px 12px; border-bottom: 1px solid #ffffff08; }
    td:not(:first-child) { text-align: right; }
    tbody tr { transition: background .15s; }
    tbody tr:hover { background: #ffffff08; }
    .bar-wrap { width: 60px; display: inline-block; vertical-align: middle; }
    .bar-bg { background: #2a2f45; border-radius: 2px; height: 5px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
    .empty {
      display: none;
      text-align: center;
      padding: 2rem;
      color: #475569;
      font-size: 13px;
    }
    .state-footer {
      margin-top: 1rem;
      padding-top: .75rem;
      border-top: 1px solid #2a2f45;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: #1D9E75;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .state-text { font-size: 11px; color: #475569; font-family: monospace; }
    .state-text span { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="dashboard">

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="filterInput" type="text" placeholder="Filtrer par région…" />
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">régions</div>
        <div class="metric-value" id="count">4</div>
      </div>
      <div class="metric">
        <div class="metric-label">total ventes</div>
        <div class="metric-value" id="total">48 400</div>
      </div>
      <div class="metric">
        <div class="metric-label">moy. crois.</div>
        <div class="metric-value" id="avg" style="color:#1D9E75">+7%</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="text-align:left">Région</th>
          <th>Ventes</th>
          <th>Bar</th>
          <th>Crois.</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="empty" id="emptyState">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" style="margin:0 auto 8px;display:block">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      Aucun résultat
    </div>

    <div class="state-footer">
      <div class="pulse"></div>
      <span class="state-text">
        state → re-render <span id="renderCount">0</span>× depuis chargement
      </span>
    </div>

  </div>

  <script>
    const donnees = [
      { region: "Nord",  ventes: 12400, crois: "+8%",  croiVal: 8  },
      { region: "Sud",   ventes: 9800,  crois: "+3%",  croiVal: 3  },
      { region: "Est",   ventes: 15200, crois: "+12%", croiVal: 12 },
      { region: "Ouest", ventes: 11000, crois: "+5%",  croiVal: 5  },
    ];

    const MAX = 15200;
    let renders = 0;

    function colorFor(val) {
      if (val >= 10) return "#1D9E75";
      if (val >= 5)  return "#fbbf24";
      return "#60a5fa";
    }

    function render(filtre) {
      renders++;
      document.getElementById("renderCount").textContent = renders;

      const lignes = donnees.filter(d =>
        d.region.toLowerCase().includes(filtre.toLowerCase())
      );

      const tbody = document.getElementById("tableBody");
      const empty = document.getElementById("emptyState");

      if (lignes.length === 0) {
        tbody.innerHTML = "";
        empty.style.display = "block";
        document.getElementById("count").textContent = "0";
        document.getElementById("total").textContent = "0";
        document.getElementById("avg").textContent   = "-";
        return;
      }

      empty.style.display = "none";

      const total = lignes.reduce((s, d) => s + d.ventes, 0);
      const avg   = Math.round(lignes.reduce((s, d) => s + d.croiVal, 0) / lignes.length);

      document.getElementById("count").textContent = lignes.length;
      document.getElementById("total").textContent = total.toLocaleString("fr-FR");
      document.getElementById("avg").textContent   = "+" + avg + "%";
      document.getElementById("avg").style.color   = colorFor(avg);

      tbody.innerHTML = lignes.map(d => {
        const pct   = Math.round((d.ventes / MAX) * 100);
        const color = colorFor(d.croiVal);
        return `
          <tr>
            <td style="font-weight:500">${d.region}</td>
            <td style="font-family:monospace;font-size:12px">${d.ventes.toLocaleString("fr-FR")}</td>
            <td>
              <div class="bar-wrap">
                <div class="bar-bg">
                  <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
                </div>
              </div>
            </td>
            <td style="color:${color};font-weight:500;font-size:12px;font-family:monospace">${d.crois}</td>
          </tr>`;
      }).join("");
    }

    document.getElementById("filterInput").addEventListener("input", e => {
      render(e.target.value);
    });

    render("");
  </script>
</body>
</html>
